<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolio ChatBot</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background:
                radial-gradient(circle at top left, #1e293b 0%, #0f172a 35%, #020617 100%);
            min-height: 100vh;
        }

        .glass {
            background: rgba(15, 23, 42, 0.65);
            backdrop-filter: blur(18px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .message-animation {
            animation: fadeIn 0.25s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .chat-scroll::-webkit-scrollbar {
            width: 6px;
        }

        .chat-scroll::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 999px;
        }

        .typing-dot {
            animation: blink 1.4s infinite;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes blink {

            0%,
            80%,
            100% {
                opacity: 0.2;
            }

            40% {
                opacity: 1;
            }
        }
    </style>
</head>

<body class="text-white flex items-center justify-center p-4">

    <div class="w-full max-w-5xl h-[92vh] glass rounded-3xl shadow-2xl overflow-hidden flex flex-col">

        <!-- Header -->
        <header class="border-b border-white/10 p-5 flex items-center justify-between">
            <div>
                <h1 class="text-2xl font-bold tracking-tight">
                    AI Portfolio Assistant
                </h1>
                <p class="text-slate-400 text-sm mt-1">
                    Інтерактивний чат-бот для портфоліо та резюме
                </p>
            </div>

            <div class="hidden md:flex items-center gap-3">
                <div class="w-3 h-3 bg-green-400 rounded-full animate-pulse"></div>
                <span class="text-sm text-slate-300">Online</span>
            </div>
        </header>

        <!-- Main Content -->
        <main class="flex-1 overflow-hidden flex flex-col">

            <!-- Chat -->
            <div id="chat" class="flex-1 overflow-y-auto chat-scroll px-4 md:px-8 py-6 space-y-5">

                <!-- Welcome Message -->
                <div class="flex items-start gap-3 message-animation">
                    <div class="w-10 h-10 rounded-full bg-cyan-500 flex items-center justify-center font-bold">
                        AI
                    </div>

                    <div
                        class="max-w-[85%] md:max-w-[70%] bg-slate-800/80 rounded-2xl rounded-tl-sm px-5 py-4 shadow-lg">
                        <p class="text-slate-100 leading-relaxed">
                            Привіт 👋<br><br>
                            Я твій персональний AI-помічник. Можу:
                        </p>

                        <ul class="mt-3 space-y-2 text-slate-300 text-sm">
                            <li>• Розповісти про навички та досвід</li>
                            <li>• Показати проєкти</li>
                            <li>• Поспілкуватися на будь-яку тему</li>
                            <li>• Відповісти на базові питання</li>
                        </ul>

                        <p class="mt-4 text-cyan-300 text-sm">
                            Напиши щось нижче 👇
                        </p>
                    </div>
                </div>

            </div>

            <!-- Input Area -->
            <div class="border-t border-white/10 p-4 md:p-5 bg-black/20">

                <div class="flex items-center gap-3">

                    <input id="userInput" type="text" placeholder="Напишіть повідомлення..."
                        class="flex-1 bg-slate-900/70 border border-white/10 rounded-2xl px-5 py-4 outline-none focus:ring-2 focus:ring-cyan-500 transition text-white placeholder:text-slate-500" />

                    <button id="sendBtn"
                        class="bg-cyan-500 hover:bg-cyan-400 active:scale-95 transition-all rounded-2xl px-6 py-4 font-semibold shadow-lg shadow-cyan-500/20">
                        Надіслати
                    </button>

                </div>

                <div class="mt-3 flex flex-wrap gap-2">

                    <button class="quick-btn">
                        Розкажи про себе
                    </button>

                    <button class="quick-btn">
                        Які твої навички?
                    </button>

                    <button class="quick-btn">
                        Покажи проєкти
                    </button>

                    <button class="quick-btn">
                        Як зв'язатися?
                    </button>

                </div>

            </div>

        </main>
    </div>

    <script>
        const chat = document.getElementById("chat");
        const input = document.getElementById("userInput");
        const sendBtn = document.getElementById("sendBtn");
        const quickButtons = document.querySelectorAll(".quick-btn");

        // Session history
        let conversationHistory = [];

        // Quick button styles
        quickButtons.forEach(btn => {
            btn.classList.add(
                "bg-slate-800/80",
                "hover:bg-slate-700",
                "transition",
                "text-sm",
                "px-4",
                "py-2",
                "rounded-full",
                "text-slate-200"
            );

            btn.addEventListener("click", () => {
                input.value = btn.textContent.trim();
                sendMessage();
            });
        });

        // Enter key
        input.addEventListener("keydown", (e) => {
            if (e.key === "Enter") {
                sendMessage();
            }
        });

        sendBtn.addEventListener("click", sendMessage);

        function addMessage(message, sender = "bot") {
            const wrapper = document.createElement("div");

            wrapper.className =
                `flex items-start gap-3 message-animation ${sender === "user" ? "justify-end" : ""
                }`;

            const avatar = document.createElement("div");

            avatar.className =
                `w-10 h-10 rounded-full flex items-center justify-center font-bold shrink-0 ${sender === "bot"
                    ? "bg-cyan-500"
                    : "bg-violet-500 order-2"
                }`;

            avatar.textContent = sender === "bot" ? "AI" : "YOU";

            const bubble = document.createElement("div");

            bubble.className =
                `max-w-[85%] md:max-w-[70%] px-5 py-4 rounded-2xl shadow-lg leading-relaxed ${sender === "bot"
                    ? "bg-slate-800/80 rounded-tl-sm text-slate-100"
                    : "bg-violet-500 rounded-tr-sm text-white order-1"
                }`;

            bubble.innerHTML = message;

            if (sender === "user") {
                wrapper.appendChild(bubble);
                wrapper.appendChild(avatar);
            } else {
                wrapper.appendChild(avatar);
                wrapper.appendChild(bubble);
            }

            chat.appendChild(wrapper);

            // Save session history
            conversationHistory.push({
                sender,
                message
            });

            sessionStorage.setItem(
                "portfolioChatHistory",
                JSON.stringify(conversationHistory)
            );

            scrollToBottom();
        }

        function scrollToBottom() {
            chat.scrollTop = chat.scrollHeight;
        }

        // Restore session
        window.addEventListener("load", () => {
            const saved = sessionStorage.getItem("portfolioChatHistory");

            if (saved) {
                conversationHistory = JSON.parse(saved);

                // Clear default welcome
                const existingMessages = [...chat.children];
                existingMessages.forEach(el => el.remove());

                conversationHistory.forEach(item => {
                    addMessage(item.message, item.sender);
                });
            }
        });

        function showTyping() {
            const typing = document.createElement("div");
            typing.id = "typing";

            typing.className = "flex items-start gap-3";

            typing.innerHTML = `
        <div class="w-10 h-10 rounded-full bg-cyan-500 flex items-center justify-center font-bold">
          AI
        </div>

        <div class="bg-slate-800/80 px-5 py-4 rounded-2xl rounded-tl-sm">
          <div class="flex gap-1">
            <span class="typing-dot">●</span>
            <span class="typing-dot">●</span>
            <span class="typing-dot">●</span>
          </div>
        </div>
      `;

            chat.appendChild(typing);
            scrollToBottom();
        }

        function removeTyping() {
            const typing = document.getElementById("typing");
            if (typing) typing.remove();
        }

        function generateBotReply(userMessage) {
            const msg = userMessage.toLowerCase();

            // Portfolio / Resume Responses
            if (msg.includes("привіт") || msg.includes("hello")) {
                return `
          Привіт 😊<br><br>
          Радий бачити тебе тут! Питай що завгодно про досвід, навички або проєкти.
        `;
            }

            if (
                msg.includes("навички") ||
                msg.includes("skills")
            ) {
                return `
          💻 Основні навички:<br><br>

          • HTML / CSS / JavaScript<br>
          • React / Vue / Tailwind CSS<br>
          • Node.js / Express<br>
          • UI/UX Design<br>
          • REST API Integration<br>
          • Responsive Web Design<br><br>

          Також люблю створювати інтерактивні та сучасні інтерфейси ✨
        `;
            }

            if (
                msg.includes("проєкт") ||
                msg.includes("portfolio")
            ) {
                return `
          🚀 Ось декілька типів проєктів:<br><br>

          • AI Chat Applications<br>
          • Landing Pages<br>
          • SaaS Dashboard UI<br>
          • E-commerce Websites<br>
          • Personal Portfolio Websites<br><br>

          Усі проєкти створюються з фокусом на UX, швидкість та сучасний дизайн.
        `;
            }

            if (
                msg.includes("контакт") ||
                msg.includes("зв'яз") ||
                msg.includes("email")
            ) {
                return `
          📬 Можемо зв'язатися через:<br><br>

          • Email: your@email.com<br>
          • LinkedIn: linkedin.com/in/yourprofile<br>
          • GitHub: github.com/yourprofile<br><br>

          Буду радий співпраці ✨
        `;
            }

            if (
                msg.includes("досвід") ||
                msg.includes("experience")
            ) {
                return `
          👨‍💻 Досвід включає:<br><br>

          • Frontend та Fullstack розробку<br>
          • Розробку чат-ботів та AI UI<br>
          • Оптимізацію продуктивності<br>
          • Адаптивну верстку<br>
          • Інтеграцію API та сучасних сервісів
        `;
            }

            if (
                msg.includes("дякую")
            ) {
                return `
          Завжди радий допомогти 😊
        `;
            }

            // Fun random responses
            const randomReplies = [
                "Цікаве питання 😄 Розкажи більше!",
                "Люблю такі розмови ✨",
                "Можу також допомогти з веб-розробкою або дизайном 🚀",
                "Тут міг би бути інтегрований справжній AI API 🤖",
                "Цей чат-бот легко підключається до OpenAI API 🔥",
                "Мінімалістичний дизайн + AI = ❤️",
                "Сучасні веб-інтерфейси — моя улюблена тема 😎"
            ];

            return randomReplies[
                Math.floor(Math.random() * randomReplies.length)
            ];
        }

        function sendMessage() {
            const message = input.value.trim();

            if (!message) return;

            addMessage(message, "user");

            input.value = "";

            showTyping();

            setTimeout(() => {
                removeTyping();

                const reply = generateBotReply(message);

                addMessage(reply, "bot");
            }, 900);
        }
    </script>

</body>

</html>
