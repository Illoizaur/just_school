<!DOCTYPE html>
<html lang="uk">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Коментарі до фільмів</title>

</head>

<body>

    <h1>Коментарі до фільмів</h1>
    {%
    for

    comment
    in
    comments
    %}

    <p><strong>користувач:</strong> {{ comment.username }} <br>
        <strong>фільм:</strong> <em>{{ comment.movie_title }}</em> <br>
        <strong>коментар:</strong> "{{ comment.comment }}" <br>
        <strong>оцінка:</strong> {{ comment.movie_rating }}/5
    </p>
    <hr>

    {%
    endfor
    %}

</body>

</html>
